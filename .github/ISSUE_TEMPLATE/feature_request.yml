name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this feature affect?
      options:
        - Smart Contract
        - SDK (TypeScript)
        - Indexer (Node.js)
        - Frontend (Next.js)
        - Documentation
        - CI/CD
        - Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What limitation does it address?
      placeholder: Describe the problem you're facing or the limitation you've encountered...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented? How would it work?
      placeholder: Describe your proposed solution in detail...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would you use this feature? What's the specific scenario?
      placeholder: Provide a concrete example of how this feature would be used...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would be helpful
        - High - Really need this
        - Critical - Blocking my work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternative approaches you've considered...
    validations:
      required: false

  - type: textarea
    id: implementation-details
    attributes:
      label: Implementation Details
      description: Do you have any ideas about how this could be implemented?
      placeholder: Any technical thoughts, API design ideas, or implementation suggestions...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request here
      placeholder: Any additional information that might help us understand the request...
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - label: Yes, I'd like to help implement this feature
        - label: Yes, I can provide more technical details
        - label: No, I prefer the maintainers to handle it
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      description: Before submitting, please confirm:
      options:
        - label: I have searched existing issues for similar requests
          required: true
        - label: I understand this is a volunteer-driven project
          required: true
        - label: I have provided enough detail for the team to understand the request
          required: true
