name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '18'
  RUST_VERSION: '1.70.0'

jobs:
  smart-contract:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ env.RUST_VERSION }}
        components: rustfmt, clippy
    
    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          contracts/router/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Install MultiversX CLI
      run: |
        curl -L https://github.com/multiversx/mx-sdk-rs/releases/latest/download/mx-linux-x64.tar.gz | tar xz
        sudo mv mx /usr/local/bin/
    
    - name: Format check
      run: |
        cd contracts/router
        cargo fmt -- --check
    
    - name: Clippy check
      run: |
        cd contracts/router
        cargo clippy -- -D warnings
    
    - name: Build contract
      run: |
        cd contracts/router
        mxpy contract build
    
    - name: Run tests
      run: |
        cd contracts/router
        mxpy contract test

  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: packages/sdk/package-lock.json
    
    - name: Install dependencies
      run: |
        cd packages/sdk
        npm ci
    
    - name: Type check
      run: |
        cd packages/sdk
        npm run build
    
    - name: Lint
      run: |
        cd packages/sdk
        npm run lint
    
    - name: Test
      run: |
        cd packages/sdk
        npm test

  indexer:
    name: Indexer Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: packages/indexer/package-lock.json
    
    - name: Install dependencies
      run: |
        cd packages/indexer
        npm ci
    
    - name: Type check
      run: |
        cd packages/indexer
        npm run build
    
    - name: Lint
      run: |
        cd packages/indexer
        npm run lint
    
    - name: Test
      run: |
        cd packages/indexer
        npm test
      env:
        MONGODB_URL: mongodb://localhost:27017
        REDIS_URL: redis://localhost:6379

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
    
    - name: Install dependencies
      run: |
        cd apps/web
        npm ci
    
    - name: Type check
      run: |
        cd apps/web
        npm run type-check
    
    - name: Lint
      run: |
        cd apps/web
        npm run lint
    
    - name: Build
      run: |
        cd apps/web
        npm run build
      env:
        NEXT_PUBLIC_NETWORK: testnet
        NEXT_PUBLIC_CONTRACT_ADDRESS: erd1...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [smart-contract, sdk, indexer, frontend]
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ env.RUST_VERSION }}
    
    - name: Install MultiversX CLI
      run: |
        curl -L https://github.com/multiversx/mx-sdk-rs/releases/latest/download/mx-linux-x64.tar.gz | tar xz
        sudo mv mx /usr/local/bin/
    
    - name: Install dependencies
      run: |
        npm ci
        cd packages/sdk && npm ci
        cd ../indexer && npm ci
        cd ../../apps/web && npm ci
    
    - name: Build contract
      run: |
        cd contracts/router
        mxpy contract build
    
    - name: Deploy test contract
      run: |
        # Deploy to testnet and get contract address
        echo "CONTRACT_ADDRESS=erd1..." >> $GITHUB_ENV
    
    - name: Run integration tests
      run: |
        cd integration-tests
        npm ci
        npm test
      env:
        CONTRACT_ADDRESS: ${{ env.CONTRACT_ADDRESS }}
        MONGODB_URL: mongodb://localhost:27017
        REDIS_URL: redis://localhost:6379

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [smart-contract, sdk, indexer, frontend, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        cd packages/sdk && npm ci
        cd ../indexer && npm ci
        cd ../../apps/web && npm ci
    
    - name: Build SDK
      run: |
        cd packages/sdk
        npm run build
    
    - name: Build Indexer
      run: |
        cd packages/indexer
        npm run build
    
    - name: Build Frontend
      run: |
        cd apps/web
        npm run build
      env:
        NEXT_PUBLIC_NETWORK: mainnet
        NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add deployment commands here
    
    - name: Run E2E tests
      run: |
        echo "Running E2E tests..."
        # Add E2E test commands here
    
    - name: Deploy to production
      if: success()
      run: |
        echo "Deploying to production..."
        # Add production deployment commands here

  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        registry-url: 'https://registry.npmjs.org'
        scope: '@ai-task-escrow'
    
    - name: Install dependencies
      run: |
        npm ci
        cd packages/sdk && npm ci
        cd ../indexer && npm ci
    
    - name: Publish SDK
      run: |
        cd packages/sdk
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    
    - name: Publish Indexer
      run: |
        cd packages/indexer
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [smart-contract, sdk, indexer, frontend, integration, security, build-and-deploy, publish]
    if: always()
    
    steps:
    - name: Notify Slack on success
      if: ${{ needs.build-and-deploy.result == 'success' }}
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"✅ AI Task Escrow Router CI/CD completed successfully!"}' \
        ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Notify Slack on failure
      if: ${{ needs.build-and-deploy.result == 'failure' }}
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data '{"text":"❌ AI Task Escrow Router CI/CD failed! Check GitHub Actions for details."}' \
        ${{ secrets.SLACK_WEBHOOK_URL }}
