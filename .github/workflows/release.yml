name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '18'

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Install dependencies
      run: |
        pnpm install --frozen-lockfile
        cd packages/sdk && pnpm install --frozen-lockfile
        cd ../indexer && pnpm install --frozen-lockfile
        cd ../../apps/web && pnpm install --frozen-lockfile
    
    - name: Build SDK
      run: |
        cd packages/sdk
        pnpm run build
    
    - name: Build Indexer
      run: |
        cd packages/indexer
        pnpm run build
    
    - name: Build Frontend
      run: |
        cd apps/web
        pnpm run build
      env:
        NEXT_PUBLIC_NETWORK: mainnet
        NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}

  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        registry-url: 'https://registry.npmjs.org'
        scope: '@ai-task-escrow'
        cache: 'pnpm'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Install dependencies
      run: |
        cd packages/sdk
        pnpm install --frozen-lockfile
    
    - name: Build package
      run: |
        cd packages/sdk
        pnpm run build
    
    - name: Publish to npm
      run: |
        cd packages/sdk
        pnpm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-indexer:
    name: Publish Indexer to npm
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        registry-url: 'https://registry.npmjs.org'
        scope: '@ai-task-escrow'
        cache: 'pnpm'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Install dependencies
      run: |
        cd packages/indexer
        pnpm install --frozen-lockfile
    
    - name: Build package
      run: |
        cd packages/indexer
        pnpm run build
    
    - name: Publish to npm
      run: |
        cd packages/indexer
        pnpm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-sdk, publish-indexer]
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          # First release - get all commits
          CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
        else
          # Get commits since last tag
          CHANGELOG=$(git log --pretty=format:"- %s" --no-merges $PREVIOUS_TAG..HEAD)
        fi
        
        # Save to file for GitHub release
        echo "$CHANGELOG" > CHANGELOG.tmp
        
        # Set output for use in next step
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          ## Changes
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## Installation
          
          ```bash
          # SDK
          npm install @ai-task-escrow/sdk@${{ github.ref_name }}
          
          # Indexer
          npm install @ai-task-escrow/indexer@${{ github.ref_name }}
          ```
          
          ## Verification
          
          Verify the integrity of the published packages:
          
          ```bash
          npm view @ai-task-escrow/sdk@${{ github.ref_name }}
          npm view @ai-task-escrow/indexer@${{ github.ref_name }}
          ```
        draft: false
        prerelease: false
