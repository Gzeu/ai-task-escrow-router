[package]
name = "router-escrow-minimal"
version = "1.0.0"
edition = "2021"
authors = ["AI Task Escrow Team"]

[lib]
path = "src/lib_minimal.rs"

[dependencies.multiversx-sc]
version = "0.52.0"

[dev-dependencies.multiversx-sc-scenario]
version = "0.52.0"

[[bin]]
name = "router-escrow-minimal"
path = "src/lib_minimal.rs"

[profile.release]
codegen-units = "copy"
opt-level = "z"
lto = true
debug = false
panic = "abort"
overflow-checks = true
